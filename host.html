<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host Controls — KBC FFF</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="host-body">

  <!-- Fixed Logo Header -->
  <div id="top-logo-bar">
    <img src="kbc.png" alt="KBC Logo" class="kbc-logo-top" />
  </div>

  <!-- SCREEN 1: Setup -->
  <div id="host-setup" class="screen active">
    <h1>🎮 Host Controls</h1>
    <p>Google Sheets માંથી પ્રશ્નો લોડ કરો</p>
    <button id="btn-load-questions">📊 Load Questions from Sheet</button>
    <p id="load-status" class="muted"></p>
    <div id="load-success" class="hidden">
      <p>✅ <span id="q-count">0</span> questions loaded</p>

      <!-- Round selector 1–6 -->
      <div id="round-selector-box">
        <p class="selector-label">કેટલા rounds રમવા છે?</p>
        <div id="round-pick-btns">
          <button class="round-pick-btn" data-r="1">1</button>
          <button class="round-pick-btn" data-r="2">2</button>
          <button class="round-pick-btn" data-r="3">3</button>
          <button class="round-pick-btn" data-r="4">4</button>
          <button class="round-pick-btn" data-r="5">5</button>
          <button class="round-pick-btn" data-r="6">6</button>
          <button class="round-pick-btn" data-r="7">7</button>
          <button class="round-pick-btn" data-r="8">8</button>
          <button class="round-pick-btn" data-r="9">9</button>
          <button class="round-pick-btn" data-r="10">10</button>
        </div>
        <p id="round-pick-note" class="muted"></p>
      </div>

      <button id="btn-go-round1" class="btn-green">🚀 Game શરૂ કરો</button>
    </div>
  </div>

  <!-- SCREEN 2: Round Control -->
  <div id="host-round" class="screen">
    <div id="host-top-bar">
      <span id="host-round-label">Round 1 of 2</span>
      <span id="host-player-count">👥 0 joined</span>
    </div>

    <!-- Round adjuster — add/remove rounds during game -->
    <div id="round-adjuster">
      <span class="adj-label">Total Rounds:</span>
      <div class="adj-controls">
        <button id="btn-rounds-dec" class="adj-btn">−</button>
        <span id="adj-rounds-val">2</span>
        <button id="btn-rounds-inc" class="adj-btn">+</button>
      </div>
    </div>

    <div id="host-questions-preview">
      <div class="host-q-row"><span class="hq-num">Q1.</span><span id="hq-0"></span><span class="hq-ans" id="hq-ans-0"></span></div>
      <div class="host-q-row"><span class="hq-num">Q2.</span><span id="hq-1"></span><span class="hq-ans" id="hq-ans-1"></span></div>
      <div class="host-q-row"><span class="hq-num">Q3.</span><span id="hq-2"></span><span class="hq-ans" id="hq-ans-2"></span></div>
      <div class="host-q-row"><span class="hq-num">Q4.</span><span id="hq-3"></span><span class="hq-ans" id="hq-ans-3"></span></div>
      <div class="host-q-row"><span class="hq-num">Q5.</span><span id="hq-4"></span><span class="hq-ans" id="hq-ans-4"></span></div>
    </div>

    <div id="live-submissions">
      <h3>⚡ Submissions (Live)</h3>
      <div id="submissions-list"></div>
    </div>

    <!-- Main controls -->
    <div id="host-controls">
      <button id="btn-start-round"    class="btn-green">▶ Start Round</button>
      <button id="btn-reveal-answers" class="btn-blue   hidden">✅ Reveal Answers</button>
      <button id="btn-next-round"     class="btn-orange hidden">→ Next Round</button>
    </div>

    <!-- Error recovery controls -->
    <div id="host-recovery">
      <p class="recovery-label">⚙️ Problem આવ્યો?</p>
      <div id="recovery-btns">
        <button id="btn-redo-round" class="btn-yellow">🔄 Redo This Round</button>
        <button id="btn-skip-round" class="btn-gray">⏭ Skip This Round</button>
      </div>
    </div>
  </div>

  <!-- SCREEN 3: Game Over -->
  <div id="host-gameover" class="screen">
    <h2>🏁 Game Over!</h2>
    <div id="final-leaderboard"></div>
    <button id="btn-new-game">🔄 New Game</button>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- App files -->
  <script src="js/config.js"></script>
  <script src="js/game.js"></script>
  <script src="js/host.js"></script>
</body>
</html>
